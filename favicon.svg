<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Pad background (yellow) -->
  <rect x="10" y="5" width="80" height="90" rx="4" fill="#FEF08A"/>
  
  <!-- Pad binding (top) -->
  <rect x="10" y="5" width="80" height="12" fill="#CA8A04"/>
  
  <!-- Red margin line -->
  <line x1="28" y1="17" x2="28" y2="95" stroke="#EF4444" stroke-width="2"/>
  
  <!-- Blue ruled lines -->
  <line x1="15" y1="35" x2="85" y2="35" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="15" y1="52" x2="85" y2="52" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="15" y1="69" x2="85" y2="69" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="15" y1="86" x2="85" y2="86" stroke="#93C5FD" stroke-width="1.5"/>
  
  <!-- Border -->
  <rect x="10" y="5" width="80" height="90" rx="4" fill="none" stroke="#CA8A04" stroke-width="2"/>
</svg>