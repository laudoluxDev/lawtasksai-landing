<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240">
  <!-- Pad background (yellow) -->
  <rect x="20" y="10" width="160" height="220" rx="8" fill="#FEF08A"/>
  
  <!-- Pad binding (top) -->
  <rect x="20" y="10" width="160" height="24" fill="#CA8A04"/>
  
  <!-- Binding rings/holes -->
  <circle cx="65" cy="22" r="6" fill="#1a1a2e"/>
  <circle cx="135" cy="22" r="6" fill="#1a1a2e"/>
  
  <!-- Red margin line -->
  <line x1="56" y1="34" x2="56" y2="230" stroke="#EF4444" stroke-width="2"/>
  
  <!-- Blue ruled lines -->
  <line x1="30" y1="70" x2="170" y2="70" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="30" y1="100" x2="170" y2="100" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="30" y1="130" x2="170" y2="130" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="30" y1="160" x2="170" y2="160" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="30" y1="190" x2="170" y2="190" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="30" y1="220" x2="170" y2="220" stroke="#93C5FD" stroke-width="1.5"/>
  
  <!-- Handwritten "Law" - centered in writing area -->
  <text x="100" y="95" font-family="Georgia, serif" font-size="46" font-weight="600" font-style="italic" fill="#2563eb" text-anchor="middle">Law</text>
  
  <!-- Handwritten "Tasks" - centered in writing area -->
  <text x="100" y="150" font-family="Georgia, serif" font-size="46" font-weight="600" font-style="italic" fill="#2563eb" text-anchor="middle">Tasks</text>
  
  <!-- Handwritten "A.I." - centered in writing area -->
  <text x="100" y="205" font-family="Georgia, serif" font-size="46" font-weight="600" font-style="italic" fill="#2563eb" text-anchor="middle">A.I.</text>
  
  <!-- Border -->
  <rect x="20" y="10" width="160" height="220" rx="8" fill="none" stroke="#CA8A04" stroke-width="3"/>
</svg>